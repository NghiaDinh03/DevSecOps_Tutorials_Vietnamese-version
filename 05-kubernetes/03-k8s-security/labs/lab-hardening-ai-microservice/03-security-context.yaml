apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemma-chat-deployment
  namespace: default
  labels:
    app: gemma-chat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gemma-chat
  template:
    metadata:
      labels:
        app: gemma-chat
    spec:
      serviceAccountName: gemma-chat-sa
      containers:
      - name: gemma-chat-app
        image: gemma-chat:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: GEMMA_API_URL
          value: "http://ollama-service:11434"
        - name: OLLAMA_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemma-secret
              key: api-key
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          runAsGroup: 10001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
