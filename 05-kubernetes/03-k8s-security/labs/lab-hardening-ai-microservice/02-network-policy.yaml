apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gemma-chat-netpol
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: gemma-chat
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  - to:
    - podSelector:
        matchLabels:
          app: ollama-service
    ports:
    - protocol: TCP
      port: 11434
