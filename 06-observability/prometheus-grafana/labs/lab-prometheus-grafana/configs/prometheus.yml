global:
  scrape_interval: 5s # Khoảng thời gian kéo dữ liệu (mặc định 15s, thu ngắn lại 5s để thực hành thấy đồ thị ngay)
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'nodejs-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['node-app:3000']
